<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATHFINDER</title>
    <style>
        @font-face {
            font-family: "mainFont";
            src: url("../static/fonts/mainFont.ttf") format("truetype");
        }

        @font-face {
            font-family: 'logoFont';
            font-style: normal;
            font-weight: 400;
            src: url("../static/fonts/logoFont.ttf") format("woff2");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: #D8CEB8;
            font-family: mainFont;
        }

        #mainArea {
            height: 700px;
            width: 1500px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            background: #faf8f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        #headerArea {
            width: 96%;
            height: 100px;
            border: 2px solid #2F2F2F;
            box-sizing: border-box;
            border-radius: 10px;
            background: #E8E1CF;
            display: flex;
            align-items: center;
        }

        #canvasArea {
            width: 98%;
            height: 560px;
            border: 2px solid #2f2f2f00;
            border-radius: 10px;
            background: #faf8f4;
        }

        #logoArea {
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 20px;
            width: 280px
        }

        #logoArea img {
            height: 70px;
            width: auto;
            display: block;
        }


        #controlArea {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
            margin-right: 20px;
        }

        #controlArea button {
            height: 42px;
            padding: 0 18px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            transform: rotate(-0.3deg);
            background: #FAF8F4;
            font-family: mainFont;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px
        }

        #controlArea button:hover {
            background: #F2EBD9;
            transform: translateY(-2px);
        }


        #algorithmDropdown {
            position: relative;
            width: 180px;
            font-family: mainFont;
            user-select: none;
            z-index: 100;

        }

        #selectedAlgorithm {
            height: 42px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            background: #FAF8F4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: pointer;
        }


        #algorithmOptions {
            position: absolute;
            width: 100%;
            top: 52px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            background: #FAF8F4;
            overflow: hidden;
            display: none;
            z-index: 101;
        }

        .option {
            padding: 12px 15px;
            cursor: pointer;
            transition: .15s;
        }

        .option:hover {
            background: #E8E1CF;
        }

        #arrow {
            transition: .2s;
        }

        .btnImg {
            width: 16px;
            height: 16px;
        }

        .selectedTool {
            background: #D8CEB8 !important;
            border: 2px solid #2F2F2F;
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, .15);
            transform: translateY(1px);
        }

        #canvasArea {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #drawCanvas {
            border-radius: 10px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div id="mainArea">
        <div id="headerArea">
            <div id="logoArea">
                <img src="../static/img/logo.png">
            </div>

            <div id="controlArea">
                <button class="toolBtn" data-tool="weight">WEIGHT</button>
                <button class="toolBtn" data-tool="wall">
                    <img src="../static/img/blackDot.png" class="btnImg">WALL</button>
                <button class="toolBtn" data-tool="start">
                    <img src="../static/img/greenDot.png" class="btnImg">START</button>
                <button class="toolBtn" data-tool="end">
                    <img src="../static/img/redDot.png" class="btnImg">END</button>
                <button class="toolBtn" data-tool="eraser">
                    <img src="../static/img/eraser.png" class="btnImg">ERASER</button>

                <div id="algorithmDropdown">
                    <div id="selectedAlgorithm">
                        BFS
                        <span id="arrow">▼</span>
                    </div>

                    <div id="algorithmOptions">
                        <div class="option">BFS</div>
                        <div class="option">DFS</div>
                        <div class="option">Dijkstra</div>
                        <div class="option">A*</div>
                    </div>
                </div>

                <button id="solve">
                    <img src="../static/img/play.png" class="btnImg">SOLVE</button>
                <button id="clearBtn">
                    <img src="../static/img/replay.png" class="btnImg">CLEAR</button>

            </div>
        </div>

        <div id="canvasArea">
            <canvas id="drawCanvas"></canvas>
        </div>
    </div>


    <script type="module" src="../static/js/canvas.js"></script>

    <script>
       
    </script>

</body>

</html>
