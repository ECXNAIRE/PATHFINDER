<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATHFINDER</title>
    <style>
        @font-face {
            font-family: "mainFont";
            src: url("../static/fonts/mainFont.ttf") format("truetype");
        }
        @font-face {
            font-family: "logoFont";
            src: url("../static/fonts/logoFont.ttf") format("truetype");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: #D8CEB8;
            font-family: mainFont;
        }

        #mainArea {
            height: 700px;
            width: 1500px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            background: #faf8f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            gap:20px;
        }

        #headerArea {
            width: 98%;
            height: 100px;
            border: 2px solid #2F2F2F;
            box-sizing: border-box;
            border-radius: 10px;
            background: #E8E1CF;
            display: flex;
            align-items: center;
        }

        #headerArea h1 {
            font-family: logoFont;
            font-size: 42px;
            font-weight: 900px;
            margin-left: 20px;
        }

        #canvasArea {
            width:98%;
            height: 560px;
            border: 2px solid #2F2F2F;
            border-radius: 10px;
            background: #E8E1CF;
        }
    </style>
</head>

<body>
    <div id="mainArea">
        <div id="headerArea">
            <h1>PathFinder</h1>
        </div>

        <div id="canvasArea">
            <canvas id="drawCanvas"></canvas>
        </div>
    </div>

</body>

</html>
